<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <title>Music App</title>
</head>
<body>
    <div class="app-container">
        <form action="" class="song-entry">
            <div class="input-label-combined-container">
                <input type="text" name="song-title" id="song-title" placeholder=" " required>
                <label for="song-title" class="montserrat-small">Song Title</label>
            </div>
            <div class="input-label-combined-container">
                <input type="text" name="artist" id="artist" placeholder=" " required>
                <label for="artist" class="montserrat-small">Artist</label>
            </div>
            <div class="input-label-combined-container">
                <input type="number" min="0" max="60" name="songminutes" id="songminutes" placeholder=" " required>  
                <label for="songminutes" class="montserrat-small">0</label>
            </div>
            <div class="input-label-combined-container">
                <input type="number" min="0" max="59" name="songseconds" id="songseconds" placeholder=" " required>
                <label for="songseconds" class="montserrat-small">00</label>
            </div>
            <div class="input-button-container">
                <input type="submit" value="Add" class="montserrat-small">
            </div>
        </form>
        <div class="now-playing-container">
            <p class="opensans-small">Now playing</p>
            <p class="montserrat-medium">Espresso</p>
            <p class="montserrat-small">Sabrina Carpenter</p>
            <p class="montserrat-small">2:</p>
            <p class="montserrat-small">58</p>
        </div>
        <div class="queue-container">
            <div class="song-container">
                <p>1</p>
                <p>Song name</p>
                <p>Artist name</p>
                <p>2</p>
                <p>58</p>
                <input type="button" value="Move to top">
                <input type="button" value="Remove">
            </div>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
